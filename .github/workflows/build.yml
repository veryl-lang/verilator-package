name: build

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Verilator tag to build (e.g. v5.048)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - { image: ubuntu-24.04, name: linux }
          - { image: ubuntu-22.04, name: linux }
          - { image: macos-15,     name: osx }
    runs-on: ${{ matrix.os.image }}
    env:
      CI_BUILD_STAGE_NAME: build
      CI_OS_NAME: ${{ matrix.os.name }}
      CI_RUNS_ON: ${{ matrix.os.image }}
    permissions:
      contents: write
    steps:
    - name: Setup variables
      id: variables
      run: |
        if [ -n "${{ inputs.tag }}" ]; then
          echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
        fi
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: 'verilator/verilator'
        ref: ${{ steps.variables.outputs.tag }}
    - name: Install packages for build
      run: ./ci/ci-install.bash
    - name: Build
      run: ./ci/ci-script.bash
    - name: Package
      run: |
        mkdir dist
        cp LICENSE dist
        cp README.rst dist
        cp -r bin dist
        cp -r include dist
        cp *.cmake dist
        rm dist/bin/verilator_bin_dbg
        pushd dist
        zip -r ../verilator-${{ matrix.os.image }}.zip .
        popd
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: "*.zip"
        tag_name: ${{ steps.variables.outputs.tag }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
